<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ViCatus — You Tried Willpower. Now Try Intelligence.</title>
    <meta name="description" content="ViCatus is the all-in-one AI-powered health app that tracks calories, steps, workouts, and helps you lose fat intelligently. Free on iOS and Android."/>
    
    <!-- Open Graph -->
    <meta property="og:url" content="https://vibecores.fit"/>
    <meta property="og:title" content="ViCatus — You Tried Willpower. Now Try Intelligence."/>
    <meta property="og:description" content="Track calories, eat smart with AI, shop healthy products — all in one app."/>
    <meta property="og:image" content="https://vibecores.fit/og-image.png"/>
    
    <!-- Favicon & Logo -->
    <link rel="icon" href="vicatus-logo.png" type="image/png"/>
    <link rel="apple-touch-icon" href="vicatus-logo.png"/>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #060c12;
            --teal: #00d4b8;
            --blue: #1a7cff;
            --text: #e2eef7;
            --muted: #6b90aa;
        }
        
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 6%;
            background: rgba(6,12,18,0.95);
            backdrop-filter: blur(16px);
            z-index: 100;
            border-bottom: 1px solid rgba(0,212,184,0.1);
        }
        
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .nav-logo img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
        }
        
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.7rem;
            letter-spacing: -0.03em;
        }
        
        .nav-brand span:last-child {
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.8rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
        }
        
        .nav-links a:hover { color: white; }
        
        .btn {
            background: linear-gradient(135deg, var(--teal), var(--blue));
            color: #000 !important;
            padding: 0.7rem 1.8rem;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,212,184,0.4);
        }
        
        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 100px 6% 80px;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(0,212,184,0.18) 0%, transparent 70%);
        }
        
        .app-icon {
            width: 148px;
            height: 148px;
            border-radius: 34px;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 0 70px rgba(0,212,184,0.7),
                        0 0 140px rgba(0,212,184,0.4);
            animation: glow 4s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 70px rgba(0,212,184,0.7), 0 0 140px rgba(0,212,184,0.4); }
            50% { box-shadow: 0 0 90px rgba(0,212,184,0.95), 0 0 180px rgba(0,212,184,0.6); }
        }
        
        .hero-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.4rem, 9vw, 6rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 1.2rem;
        }
        
        .hero-title span:last-child {
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-size: 1.15rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }
        
        .willpower {
            background: rgba(15,31,46,0.9);
            border: 1px solid rgba(0,212,184,0.3);
            border-radius: 20px;
            padding: 2.2rem 3rem;
            max-width: 480px;
            font-size: 1.45rem;
            line-height: 1.35;
            margin-bottom: 3rem;
        }
        
        .dl-stack {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 380px;
            margin: 0 auto;
        }
        
        .dl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.6rem;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s;
        }
        
        .dl-btn:hover { transform: translateY(-4px); }
        
        .dl-apple { background: linear-gradient(135deg, #1a5cf8, #22c55e); }
        .dl-google { background: linear-gradient(135deg, #ec4899, #00d4b8); }
        
        .free {
            text-align: center;
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <a href="#" class="nav-logo">
            <img src="vicatus-logo.png" alt="ViCatus Logo"/>
            <span class="nav-brand"><span>Vi</span><span>Catus</span></span>
        </a>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#how">How It Works</a></li>
            <li><a href="#download" class="btn">Download Free</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero" id="download">
        <div class="app-icon">
            <img src="vicatus-logo.png" alt="ViCatus App Icon" style="width:100%; height:100%; object-fit:cover;">
        </div>
        
        <h1 class="hero-title"><span>Vi</span><span>Catus</span></h1>
        <p class="tagline">TRACK • EAT SMART • SHOP • REACH YOUR GOAL</p>
        
        <div class="willpower">
            You tried willpower.<br>Now try Intelligence.
        </div>
        
        <div class="dl-stack">
            <a href="YOUR_APP_STORE_LINK_HERE" class="dl-btn dl-apple" target="_blank" rel="noopener">
                Download on the App Store
            </a>
            <a href="YOUR_GOOGLE_PLAY_LINK_HERE" class="dl-btn dl-google" target="_blank" rel="noopener">
                Get it on Google Play
            </a>
        </div>
        
        <p class="free">Free to download • No credit card required</p>
    </section>

</body>
</html>
