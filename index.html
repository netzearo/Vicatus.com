<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ViCatus — You Tried Willpower. Now Try Intelligence.</title>
    <meta name="description" content="ViCatus is the all-in-one AI-powered health app that tracks calories, steps, workouts, and helps you lose fat intelligently."/>
    
    <link rel="icon" href="vicatus-logo.png" type="image/png"/>
    <link rel="apple-touch-icon" href="vicatus-logo.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #060c12;
            --teal: #00d4b8;
            --blue: #1a7cff;
            --text: #e2eef7;
            --muted: #6b90aa;
        }
        
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.4rem 8%;
            background: rgba(6,12,18,0.95);
            backdrop-filter: blur(16px);
            z-index: 100;
        }
        
        .nav-logo img { width: 45px; height: 45px; border-radius: 50%; }
        .nav-brand { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; }
        .nav-brand span:last-child {
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        
        /* HERO - Much better spacing for desktop */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 8% 100px;
            position: relative;
        }
        
        .app-icon {
            width: 160px;
            height: 160px;
            border-radius: 36px;
            overflow: hidden;
            margin-bottom: 2.5rem;
            box-shadow: 0 0 80px rgba(0,212,184,0.7);
        }
        
        .hero-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 8vw, 6.2rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        .hero-title span:last-child {
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-size: 1.25rem;
            color: var(--muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
        
        .willpower {
            background: rgba(15,31,46,0.9);
            border: 1px solid rgba(0,212,184,0.35);
            border-radius: 24px;
            padding: 2.5rem 3.5rem;
            max-width: 520px;
            font-size: 1.55rem;
            line-height: 1.4;
            margin-bottom: 3.5rem;
        }
        
        /* Download Buttons - Much cleaner */
        .dl-stack {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 520px;
            margin: 0 auto;
        }
        
        .dl-btn {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            min-width: 240px;
            transition: all 0.3s;
        }
        
        .dl-btn:hover { transform: translateY(-6px); }
        
        .dl-apple {
            background: linear-gradient(135deg, #1a5cf8, #22c55e);
        }
        
        .dl-google {
            background: linear-gradient(135deg, #ec4899, #00d4b8);
        }
        
        .free {
            margin-top: 2rem;
            color: var(--muted);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">
            <img src="vicatus-logo.png" alt="ViCatus"/>
            <span class="nav-brand"><span>Vi</span><span>Catus</span></span>
        </a>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#how">How It Works</a></li>
            <li><a href="#download" class="btn">Download Free</a></li>
        </ul>
    </nav>

    <section class="hero" id="download">
        <div class="app-icon">
            <img src="vicatus-logo.png" alt="ViCatus App Icon" style="width:100%;height:100%;object-fit:cover;">
        </div>
        
        <h1 class="hero-title"><span>Vi</span><span>Catus</span></h1>
        <p class="tagline">TRACK • EAT SMART • SHOP • REACH YOUR GOAL</p>
        
        <div class="willpower">
            You tried willpower.<br>Now try Intelligence.
        </div>
        
        <div class="dl-stack">
            <a href="YOUR_APP_STORE_LINK_HERE" class="dl-btn dl-apple" target="_blank" rel="noopener">
                Download on the App Store
            </a>
            <a href="YOUR_GOOGLE_PLAY_LINK_HERE" class="dl-btn dl-google" target="_blank" rel="noopener">
                Get it on Google Play
            </a>
        </div>
        
        <p class="free">Free to download • Available on iOS and Android</p>
    </section>

</body>
</html>
